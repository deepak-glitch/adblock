name: Build Fire TV APK

# Cloud "compiler" for the Fire TV app — runs on GitHub's servers, so no local
# Android SDK is needed. Every push that touches firetv/ builds the APK and
# uploads it as a downloadable artifact you can sideload onto a Fire TV.
on:
  push:
    branches: [ main ]
    paths:
      - 'firetv/**'
      - '.github/workflows/firetv-build.yml'
  pull_request:
    paths:
      - 'firetv/**'
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

# Allow the workflow to publish the built APK as a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firetv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-adblock-firetv-debug
          path: firetv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Publish the APK to a fixed "firetv-latest" release so there's a stable,
      # public, login-free URL you can paste into the Downloader app on Fire TV.
      - name: Publish to rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firetv-latest
          name: Fire TV app — latest build
          body: |
            Auto-built debug APK of the Stream AdBlock Fire TV app.
            Sideload on a Fire OS device via the Downloader app using this URL:
            https://github.com/deepak-glitch/adblock/releases/download/firetv-latest/app-debug.apk
          files: firetv/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
