name: Build Fire TV APK

# Cloud "compiler" for the Fire TV app — runs on GitHub's servers, so no local
# Android SDK is needed. Every push that touches firetv/ builds the APK and
# uploads it as a downloadable artifact you can sideload onto a Fire TV.
on:
  push:
    branches: [ main ]
    paths:
      - 'firetv/**'
      - '.github/workflows/firetv-build.yml'
  pull_request:
    paths:
      - 'firetv/**'
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firetv
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-adblock-firetv-debug
          path: firetv/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
